<svg xmlns="http://www.w3.org/2000/svg" width="780" height="120" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565C0"/></marker>
  </defs>

  <!-- Box 1: AUX_ADV_IND -->
  <rect x="10" y="25" width="190" height="55" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="105" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">AUX_ADV_IND</text>
  <text x="105" y="68" text-anchor="middle" font-size="11" fill="#555">数据 Part 1</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="52" x2="278" y2="52" stroke="#1565C0" stroke-width="2" marker-end="url(#a1)"/>
  <text x="239" y="44" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">AuxPtr</text>

  <!-- Box 2: AUX_CHAIN_IND #1 -->
  <rect x="285" y="25" width="190" height="55" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="380" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">AUX_CHAIN_IND</text>
  <text x="380" y="68" text-anchor="middle" font-size="11" fill="#555">数据 Part 2</text>

  <!-- Arrow 2 -->
  <line x1="475" y1="52" x2="553" y2="52" stroke="#E65100" stroke-width="2" marker-end="url(#a1)"/>
  <text x="514" y="44" text-anchor="middle" font-size="10" fill="#E65100" font-weight="bold">AuxPtr</text>

  <!-- Box 3: AUX_CHAIN_IND #2 (last) -->
  <rect x="560" y="25" width="200" height="55" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="660" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">AUX_CHAIN_IND</text>
  <text x="660" y="68" text-anchor="middle" font-size="11" fill="#555">数据 Part 3 (无 AuxPtr = 结束)</text>

  <!-- Bottom note -->
  <text x="390" y="108" text-anchor="middle" font-size="11" fill="#888">链式传输：突破单包容量限制，最大可传输 255 字节广播数据</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="560" height="260" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565C0"/></marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6" fill="#E65100"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2E7D32"/></marker>
    <marker id="agl" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6" fill="#2E7D32"/></marker>
  </defs>

  <text x="280" y="20" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">LL 加密建立流程</text>

  <!-- Lifelines -->
  <rect x="40" y="35" width="120" height="28" rx="6" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="100" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Central (主机)</text>
  <line x1="100" y1="63" x2="100" y2="250" stroke="#42A5F5" stroke-width="2" stroke-dasharray="6,4"/>

  <rect x="380" y="35" width="130" height="28" rx="6" fill="#7E57C2" stroke="#4A148C" stroke-width="1.5"/>
  <text x="445" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Peripheral (从机)</text>
  <line x1="445" y1="63" x2="445" y2="250" stroke="#7E57C2" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Step 1: LL_ENC_REQ -->
  <line x1="105" y1="90" x2="438" y2="90" stroke="#1565C0" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="140" y="77" width="270" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="275" y="93" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">LL_ENC_REQ (Rand+EDIV+SKDm+IVm)</text>

  <!-- Step 2: LL_ENC_RSP -->
  <line x1="440" y1="130" x2="107" y2="130" stroke="#E65100" stroke-width="1.8" marker-end="url(#al)"/>
  <rect x="160" y="117" width="235" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="278" y="133" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">LL_ENC_RSP (SKDs+IVs)</text>

  <!-- Step 3: LL_START_ENC_REQ -->
  <line x1="440" y1="170" x2="107" y2="170" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#agl)"/>
  <rect x="160" y="157" width="235" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="278" y="173" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">LL_START_ENC_REQ</text>

  <!-- Step 4: LL_START_ENC_RSP -->
  <line x1="105" y1="210" x2="438" y2="210" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#ag)"/>
  <rect x="160" y="197" width="235" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="278" y="213" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">LL_START_ENC_RSP</text>

  <!-- Result -->
  <text x="280" y="245" text-anchor="middle" font-size="13" fill="#2E7D32" font-weight="bold">加密通道建立 ✓</text>
</svg>
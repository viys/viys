<svg xmlns="http://www.w3.org/2000/svg" width="660" height="360" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="14">
  <defs>
    <style>
      .state{font-size:14px;font-weight:bold;fill:#fff;text-anchor:middle}
      .note{font-size:11.5px;fill:#555;text-anchor:middle}
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#555"/></marker>
  </defs>
  <text x="330" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">链路层状态机</text>

  <!-- Standby -->
  <rect x="230" y="50" width="200" height="50" rx="25" fill="#78909C" stroke="#37474F" stroke-width="2"/>
  <text x="330" y="81" class="state">Standby</text>

  <!-- Advertising -->
  <rect x="30" y="170" width="170" height="50" rx="25" fill="#7E57C2" stroke="#4A148C" stroke-width="2"/>
  <text x="115" y="201" class="state">Advertising</text>

  <!-- Scanning -->
  <rect x="245" y="170" width="170" height="50" rx="25" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
  <text x="330" y="201" class="state">Scanning</text>

  <!-- Initiating -->
  <rect x="460" y="170" width="170" height="50" rx="25" fill="#66BB6A" stroke="#2E7D32" stroke-width="2"/>
  <text x="545" y="201" class="state">Initiating</text>

  <!-- Connection -->
  <rect x="200" y="280" width="260" height="55" rx="28" fill="#EF5350" stroke="#B71C1C" stroke-width="2"/>
  <text x="330" y="311" class="state">Connection (Central / Peripheral)</text>

  <!-- Arrows: Standby -> Advertising -->
  <line x1="270" y1="100" x2="145" y2="168" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Standby -> Scanning -->
  <line x1="330" y1="100" x2="330" y2="168" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Standby -> Initiating -->
  <line x1="390" y1="100" x2="515" y2="168" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Advertising -> Connection -->
  <line x1="115" y1="220" x2="250" y2="280" stroke="#E65100" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="150" y="258" font-size="10.5" fill="#E65100">收到 CONNECT_REQ</text>

  <!-- Initiating -> Connection -->
  <line x1="545" y1="220" x2="410" y2="280" stroke="#E65100" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="510" y="258" font-size="10.5" fill="#E65100">发送 CONNECT_REQ</text>

  <!-- Connection -> Standby (disconnect) -->
  <path d="M 460,295 Q 600,295 600,75 Q 600,50 430,75" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="610" y="180" font-size="10.5" fill="#999" transform="rotate(90,610,180)">断开连接</text>
</svg>
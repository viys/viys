<svg xmlns="http://www.w3.org/2000/svg" width="750" height="520" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="12">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565C0"/></marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="#E65100"/></marker>
  </defs>
  <text x="375" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">GATT Service 发现流程</text>

  <!-- Lifelines -->
  <rect x="60" y="45" width="120" height="32" rx="6" fill="#42A5F5"/>
  <text x="120" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Client</text>
  <line x1="120" y1="77" x2="120" y2="510" stroke="#42A5F5" stroke-width="1.8" stroke-dasharray="5,4"/>

  <rect x="540" y="45" width="120" height="32" rx="6" fill="#7E57C2"/>
  <text x="600" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Server</text>
  <line x1="600" y1="77" x2="600" y2="510" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5,4"/>

  <!-- Step 1 header -->
  <rect x="15" y="95" width="720" height="125" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="30" y="113" font-size="13" font-weight="bold" fill="#2E7D32">步骤 1：发现所有 Primary Service</text>

  <line x1="125" y1="130" x2="593" y2="130" stroke="#1565C0" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="360" y="125" text-anchor="middle" font-size="11.5" fill="#1565C0" font-weight="bold">ATT_READ_BY_GROUP_TYPE_REQ</text>
  <text x="360" y="140" text-anchor="middle" font-size="10.5" fill="#888">(Start=0x0001, End=0xFFFF, UUID=0x2800)</text>

  <line x1="595" y1="170" x2="127" y2="170" stroke="#E65100" stroke-width="1.8" marker-end="url(#al)"/>
  <text x="360" y="165" text-anchor="middle" font-size="11.5" fill="#E65100" font-weight="bold">ATT_READ_BY_GROUP_TYPE_RSP</text>
  <text x="360" y="180" text-anchor="middle" font-size="10.5" fill="#888">[StartHandle, EndHandle, ServiceUUID] ...</text>

  <!-- Step 2 header -->
  <rect x="15" y="230" width="720" height="125" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="30" y="248" font-size="13" font-weight="bold" fill="#1565C0">步骤 2：发现 Characteristic Declaration</text>

  <line x1="125" y1="265" x2="593" y2="265" stroke="#1565C0" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="360" y="260" text-anchor="middle" font-size="11.5" fill="#1565C0" font-weight="bold">ATT_READ_BY_TYPE_REQ</text>
  <text x="360" y="275" text-anchor="middle" font-size="10.5" fill="#888">(Start=ServiceStart, End=ServiceEnd, UUID=0x2803)</text>

  <line x1="595" y1="305" x2="127" y2="305" stroke="#E65100" stroke-width="1.8" marker-end="url(#al)"/>
  <text x="360" y="300" text-anchor="middle" font-size="11.5" fill="#E65100" font-weight="bold">ATT_READ_BY_TYPE_RSP</text>
  <text x="360" y="315" text-anchor="middle" font-size="10.5" fill="#888">[DeclHandle, Properties, ValueHandle, CharUUID] ...</text>

  <!-- Step 3 header -->
  <rect x="15" y="365" width="720" height="125" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>
  <text x="30" y="383" font-size="13" font-weight="bold" fill="#E65100">步骤 3：发现 Descriptor</text>

  <line x1="125" y1="400" x2="593" y2="400" stroke="#1565C0" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="360" y="395" text-anchor="middle" font-size="11.5" fill="#1565C0" font-weight="bold">ATT_FIND_INFORMATION_REQ</text>
  <text x="360" y="410" text-anchor="middle" font-size="10.5" fill="#888">(Start=ValueHandle+1, End=NextDeclHandle-1)</text>

  <line x1="595" y1="440" x2="127" y2="440" stroke="#E65100" stroke-width="1.8" marker-end="url(#al)"/>
  <text x="360" y="435" text-anchor="middle" font-size="11.5" fill="#E65100" font-weight="bold">ATT_FIND_INFORMATION_RSP</text>
  <text x="360" y="450" text-anchor="middle" font-size="10.5" fill="#888">[DescHandle, DescUUID] ...</text>
</svg>
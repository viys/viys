<svg xmlns="http://www.w3.org/2000/svg" width="700" height="260" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="12">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565C0"/></marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6" fill="#E65100"/></marker>
  </defs>
  <text x="350" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">CCCD 订阅 Notification 流程</text>

  <!-- Lifelines -->
  <rect x="60" y="40" width="100" height="28" rx="6" fill="#42A5F5"/>
  <text x="110" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Client</text>
  <line x1="110" y1="68" x2="110" y2="250" stroke="#42A5F5" stroke-width="1.8" stroke-dasharray="5,4"/>

  <rect x="520" y="40" width="100" height="28" rx="6" fill="#7E57C2"/>
  <text x="570" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Server</text>
  <line x1="570" y1="68" x2="570" y2="250" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5,4"/>

  <!-- Step 1: Write CCCD -->
  <line x1="115" y1="95" x2="563" y2="95" stroke="#1565C0" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="170" y="79" width="340" height="22" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="340" y="95" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">Write Request (CCCD Handle, Value = 0x0001)</text>

  <!-- Step 2: Write Response -->
  <line x1="565" y1="130" x2="117" y2="130" stroke="#E65100" stroke-width="1.8" marker-end="url(#al)"/>
  <rect x="260" y="114" width="160" height="22" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="340" y="130" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">Write Response</text>

  <!-- Separator -->
  <line x1="50" y1="158" x2="640" y2="158" stroke="#2E7D32" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="340" y="172" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">此后，每当 Characteristic Value 更新...</text>

  <!-- Step 3: Notification -->
  <line x1="565" y1="200" x2="117" y2="200" stroke="#2E7D32" stroke-width="2" marker-end="url(#al)"/>
  <rect x="155" y="184" width="370" height="22" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="340" y="200" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">ATT_HANDLE_VALUE_NTF (Value Handle, 新数据)</text>

  <!-- Note -->
  <text x="340" y="235" text-anchor="middle" font-size="11" fill="#888">Notification 无需 Client 回复（无 ACK）</text>
</svg>
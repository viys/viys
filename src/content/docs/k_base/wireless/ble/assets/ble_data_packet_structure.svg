<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="13">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: bold; fill: #1a1a1a; }
      .layer-label { font-size: 13px; font-weight: bold; fill: #fff; }
      .field-label { font-size: 12px; fill: #1a1a1a; text-anchor: middle; }
      .field-sub { font-size: 10.5px; fill: #555; text-anchor: middle; }
      .note-text { font-size: 11.5px; fill: #333; }
      .note-bold { font-size: 11.5px; fill: #c00; font-weight: bold; }
    </style>
  </defs>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" class="title">BLE 数据包完整封装结构</text>

  <!-- ==================== Layer 1: Physical (outermost) ==================== -->
  <rect x="20" y="50" width="920" height="70" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="30" y="68" font-size="11" font-weight="bold" fill="#1565C0">物理层</text>

  <!-- Preamble -->
  <rect x="30" y="75" width="80" height="38" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.2"/>
  <text x="70" y="93" class="field-label">Preamble</text>
  <text x="70" y="107" class="field-sub">1 字节 (先导)</text>

  <!-- Access Address -->
  <rect x="118" y="75" width="110" height="38" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.2"/>
  <text x="173" y="93" class="field-label">Access Address</text>
  <text x="173" y="107" class="field-sub">4 字节 (接入地址)</text>

  <!-- PDU placeholder area -->
  <rect x="236" y="75" width="600" height="38" rx="4" fill="#fff" stroke="#1565C0" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="536" y="98" class="field-label" fill="#1565C0">蓝牙数据包的 PDU  ←  见下方展开</text>

  <!-- CRC -->
  <rect x="844" y="75" width="86" height="38" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.2"/>
  <text x="887" y="93" class="field-label">CRC</text>
  <text x="887" y="107" class="field-sub">3 字节</text>

  <!-- ==================== Layer 2: Link Layer ==================== -->
  <rect x="40" y="140" width="880" height="70" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="50" y="158" font-size="11" font-weight="bold" fill="#2E7D32">链路层 (LL)</text>

  <!-- LL Header -->
  <rect x="50" y="165" width="130" height="38" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="115" y="182" class="field-label">LL Header</text>
  <text x="115" y="196" class="field-sub">2 字节</text>

  <!-- LL Payload -->
  <rect x="188" y="165" width="610" height="38" rx="4" fill="#fff" stroke="#2E7D32" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="493" y="188" class="field-label" fill="#2E7D32">LL Payload / L2CAP PDU（0 – 251 字节）  ←  见下方展开</text>

  <!-- MIC -->
  <rect x="806" y="165" width="104" height="38" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="858" y="182" class="field-label">MIC</text>
  <text x="858" y="196" class="field-sub">4 字节 (可选)</text>

  <!-- LL Header detail annotation -->
  <text x="55" y="224" font-size="10.5" fill="#2E7D32">LL Header 包含: LLID(2b) NESN(1b) SN(1b) MD(1b) RFU(3b) Payload Length(8b)</text>

  <!-- ==================== Layer 3: L2CAP ==================== -->
  <rect x="60" y="240" width="840" height="70" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="70" y="258" font-size="11" font-weight="bold" fill="#E65100">L2CAP</text>

  <!-- L2CAP Header -->
  <rect x="70" y="265" width="160" height="38" rx="4" fill="#FFE0B2" stroke="#E65100" stroke-width="1.2"/>
  <text x="150" y="282" class="field-label">L2CAP Header · 4 字节</text>
  <text x="150" y="296" class="field-sub">Length(2B) + CID(2B)</text>

  <!-- L2CAP Payload -->
  <rect x="238" y="265" width="652" height="38" rx="4" fill="#fff" stroke="#E65100" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="564" y="288" class="field-label" fill="#E65100">L2CAP Payload / ATT 层数据（0 – 247 字节）  ←  见下方展开</text>

  <!-- ==================== Layer 4: ATT ==================== -->
  <rect x="80" y="330" width="800" height="70" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="2"/>
  <text x="90" y="348" font-size="11" font-weight="bold" fill="#C62828">ATT</text>

  <!-- OpCode -->
  <rect x="90" y="355" width="100" height="38" rx="4" fill="#F8BBD0" stroke="#C62828" stroke-width="1.2"/>
  <text x="140" y="372" class="field-label">OpCode</text>
  <text x="140" y="386" class="field-sub">1 字节 (操作码)</text>

  <!-- Attribute Handle -->
  <rect x="198" y="355" width="130" height="38" rx="4" fill="#F8BBD0" stroke="#C62828" stroke-width="1.2"/>
  <text x="263" y="372" class="field-label">Attr Handle</text>
  <text x="263" y="386" class="field-sub">2 字节 (属性句柄)</text>

  <!-- ATT Payload -->
  <rect x="336" y="355" width="534" height="38" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1.2"/>
  <text x="603" y="372" class="field-label">ATT Payload（有效数据）</text>
  <text x="603" y="386" class="field-sub">max 244 字节 · 主机从交互的数据</text>

  <!-- ATT Header brace -->
  <line x1="90" y1="396" x2="328" y2="396" stroke="#C62828" stroke-width="1.5"/>
  <text x="209" y="409" font-size="10.5" fill="#C62828" text-anchor="middle" font-weight="bold">← ATT Header 3 字节 →</text>

  <!-- ==================== Notes ==================== -->
  <rect x="20" y="425" width="920" height="85" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
  <text x="35" y="444" class="note-bold">关键长度换算：</text>
  <text x="35" y="462" class="note-text">• ATT_MTU = L2CAP SDU 长度 = ATT Header(3B) + ATT Payload    →  默认 23 字节，启用 DLE 后最大 247 字节</text>
  <text x="35" y="479" class="note-text">• L2CAP PDU = ATT_MTU + L2CAP Header(4B)                     →  默认 27 字节，启用 DLE 后最大 251 字节</text>
  <text x="35" y="496" class="note-text">• LL Payload Length 包含 MIC 在内的有效净荷长度；L2CAP Header 中的 Length 字段指 ATT 数据长度（最大 247 字节）</text>
</svg>
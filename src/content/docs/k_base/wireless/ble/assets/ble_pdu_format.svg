<svg xmlns="http://www.w3.org/2000/svg" width="700" height="240" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="13">
  <text x="350" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">BLE PDU 格式</text>

  <!-- Advertising PDU -->
  <text x="20" y="55" font-size="13" font-weight="bold" fill="#1565C0">广播 PDU：</text>
  <rect x="20" y="62" width="120" height="40" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="80" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">PDU Type</text>
  <text x="80" y="96" text-anchor="middle" font-size="10" fill="#555">4 bits</text>

  <rect x="140" y="62" width="100" height="40" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="190" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Length</text>
  <text x="190" y="96" text-anchor="middle" font-size="10" fill="#555">6 bits</text>

  <rect x="240" y="62" width="440" height="40" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="460" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Payload</text>
  <text x="460" y="96" text-anchor="middle" font-size="10" fill="#555">0 – 37 bytes</text>

  <!-- Data PDU -->
  <text x="20" y="135" font-size="13" font-weight="bold" fill="#7E57C2">数据 PDU：</text>
  <rect x="20" y="142" width="65" height="40" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="52" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#7E57C2">LLID</text>
  <text x="52" y="176" text-anchor="middle" font-size="9" fill="#555">2b</text>

  <rect x="85" y="142" width="60" height="40" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="115" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#7E57C2">NESN</text>
  <text x="115" y="176" text-anchor="middle" font-size="9" fill="#555">1b</text>

  <rect x="145" y="142" width="50" height="40" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="170" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#7E57C2">SN</text>
  <text x="170" y="176" text-anchor="middle" font-size="9" fill="#555">1b</text>

  <rect x="195" y="142" width="50" height="40" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="220" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#7E57C2">MD</text>
  <text x="220" y="176" text-anchor="middle" font-size="9" fill="#555">1b</text>

  <rect x="245" y="142" width="55" height="40" rx="4" fill="#E0E0E0" stroke="#757575" stroke-width="1"/>
  <text x="272" y="160" text-anchor="middle" font-size="11" fill="#757575">RFU</text>
  <text x="272" y="176" text-anchor="middle" font-size="9" fill="#555">3b</text>

  <rect x="300" y="142" width="85" height="40" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="342" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Length</text>
  <text x="342" y="176" text-anchor="middle" font-size="9" fill="#555">5b</text>

  <rect x="385" y="142" width="295" height="40" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="532" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Payload</text>
  <text x="532" y="176" text-anchor="middle" font-size="10" fill="#555">0 – 27 bytes</text>

  <!-- Notes -->
  <text x="20" y="210" font-size="11" fill="#555">LLID: 逻辑链路标识　SN/NESN: 序列号 / 期望下一序列号（ARQ 重传用）　MD: More Data 标志</text>
  <text x="20" y="228" font-size="11" fill="#555">RFU: Reserved for Future Use　Header 总计 16 bits (2 字节)</text>
</svg>
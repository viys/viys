<svg xmlns="http://www.w3.org/2000/svg" width="720" height="920" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565C0"/></marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6" fill="#E65100"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2E7D32"/></marker>
    <marker id="agl" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6" fill="#2E7D32"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7E57C2"/></marker>
    <marker id="apl" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6" fill="#7E57C2"/></marker>
    <marker id="ared" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#C62828"/></marker>
  </defs>

  <!-- Title -->
  <text x="360" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">BLE 完整连接交互时序</text>

  <!-- Lifelines -->
  <rect x="50" y="40" width="160" height="32" rx="6" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="130" y="61" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Central (主机)</text>
  <line x1="130" y1="72" x2="130" y2="900" stroke="#42A5F5" stroke-width="2" stroke-dasharray="6,4"/>

  <rect x="490" y="40" width="170" height="32" rx="6" fill="#7E57C2" stroke="#4A148C" stroke-width="1.5"/>
  <text x="575" y="61" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Peripheral (从机)</text>
  <line x1="575" y1="72" x2="575" y2="900" stroke="#7E57C2" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ===== Phase 1: 广播阶段 ===== -->
  <rect x="5" y="88" width="14" height="105" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="12" y="145" text-anchor="middle" font-size="10" fill="#1565C0" writing-mode="tb">广播阶段</text>

  <!-- ADV_IND -->
  <line x1="570" y1="105" x2="137" y2="105" stroke="#1565C0" stroke-width="1.8" marker-end="url(#al)"/>
  <rect x="240" y="92" width="230" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="355" y="108" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">ADV_IND</text>

  <!-- SCAN_REQ -->
  <line x1="135" y1="145" x2="568" y2="145" stroke="#E65100" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="240" y="132" width="230" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="355" y="148" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">SCAN_REQ</text>

  <!-- SCAN_RSP -->
  <line x1="570" y1="180" x2="137" y2="180" stroke="#1565C0" stroke-width="1.8" marker-end="url(#al)"/>
  <rect x="240" y="167" width="230" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="355" y="183" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">SCAN_RSP</text>

  <!-- ===== Phase 2: 连接建立 ===== -->
  <rect x="5" y="205" width="14" height="45" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="12" y="232" text-anchor="middle" font-size="10" fill="#E65100" writing-mode="tb">连接</text>

  <!-- CONNECT_IND -->
  <line x1="135" y1="225" x2="568" y2="225" stroke="#E65100" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="220" y="212" width="270" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="355" y="228" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">CONNECT_IND (连接参数)</text>

  <!-- Separator: 切换数据信道 -->
  <line x1="30" y1="258" x2="690" y2="258" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="230" y="248" width="250" height="20" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="355" y="263" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">连接建立，切换数据信道</text>

  <!-- ===== Phase 3: 链路层交换 ===== -->
  <rect x="5" y="280" width="14" height="170" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="12" y="355" text-anchor="middle" font-size="10" fill="#2E7D32" writing-mode="tb">链路层交换</text>

  <!-- LL_VERSION_IND (C→P) -->
  <line x1="135" y1="300" x2="568" y2="300" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#ag)"/>
  <rect x="240" y="287" width="230" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="355" y="303" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">LL_VERSION_IND</text>
  <text x="680" y="303" font-size="10" fill="#888">版本交换</text>

  <!-- LL_VERSION_IND (P→C) -->
  <line x1="570" y1="330" x2="137" y2="330" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#agl)"/>
  <rect x="240" y="317" width="230" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="355" y="333" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">LL_VERSION_IND</text>

  <!-- LL_FEATURE_REQ -->
  <line x1="135" y1="365" x2="568" y2="365" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#ag)"/>
  <rect x="240" y="352" width="230" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="355" y="368" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">LL_FEATURE_REQ</text>
  <text x="680" y="368" font-size="10" fill="#888">功能交换</text>

  <!-- LL_FEATURE_RSP -->
  <line x1="570" y1="395" x2="137" y2="395" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#agl)"/>
  <rect x="240" y="382" width="230" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="355" y="398" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">LL_FEATURE_RSP</text>

  <!-- LL_LENGTH_REQ -->
  <line x1="135" y1="430" x2="568" y2="430" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#ag)"/>
  <rect x="240" y="417" width="230" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="355" y="433" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">LL_LENGTH_REQ</text>
  <text x="680" y="433" font-size="10" fill="#888">DLE 协商</text>

  <!-- LL_LENGTH_RSP -->
  <line x1="570" y1="460" x2="137" y2="460" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#agl)"/>
  <rect x="240" y="447" width="230" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="355" y="463" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold">LL_LENGTH_RSP</text>

  <!-- ===== Phase 4: ATT/GATT 交互 ===== -->
  <rect x="5" y="485" width="14" height="310" rx="3" fill="#FCE4EC" stroke="#C62828" stroke-width="1"/>
  <text x="12" y="620" text-anchor="middle" font-size="10" fill="#C62828" writing-mode="tb">ATT / GATT 交互</text>

  <!-- ATT Exchange MTU Req -->
  <line x1="135" y1="505" x2="568" y2="505" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#ap)"/>
  <rect x="215" y="492" width="280" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="508" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Exchange MTU Request</text>
  <text x="680" y="508" font-size="10" fill="#888">MTU 协商</text>

  <!-- ATT Exchange MTU Rsp -->
  <line x1="570" y1="535" x2="137" y2="535" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#apl)"/>
  <rect x="215" y="522" width="280" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="538" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Exchange MTU Response</text>

  <!-- Read By Group Type Req -->
  <line x1="135" y1="570" x2="568" y2="570" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#ap)"/>
  <rect x="205" y="557" width="300" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="573" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Read By Group Type Req</text>
  <text x="680" y="573" font-size="10" fill="#888">服务发现</text>

  <!-- Read By Group Type Rsp -->
  <line x1="570" y1="600" x2="137" y2="600" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#apl)"/>
  <rect x="205" y="587" width="300" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="603" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Read By Group Type Rsp</text>
  <text x="680" y="603" font-size="10" fill="#888">...多轮</text>

  <!-- Read By Type Req -->
  <line x1="135" y1="640" x2="568" y2="640" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#ap)"/>
  <rect x="215" y="627" width="280" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="643" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Read By Type Req</text>
  <text x="680" y="643" font-size="10" fill="#888">特征发现</text>

  <!-- Read By Type Rsp -->
  <line x1="570" y1="670" x2="137" y2="670" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#apl)"/>
  <rect x="215" y="657" width="280" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="673" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Read By Type Rsp</text>
  <text x="680" y="673" font-size="10" fill="#888">...多轮</text>

  <!-- Find Info Req -->
  <line x1="135" y1="710" x2="568" y2="710" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#ap)"/>
  <rect x="215" y="697" width="280" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="713" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Find Information Req</text>
  <text x="680" y="713" font-size="10" fill="#888">描述符发现</text>

  <!-- Find Info Rsp -->
  <line x1="570" y1="740" x2="137" y2="740" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#apl)"/>
  <rect x="215" y="727" width="280" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="743" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Find Information Rsp</text>

  <!-- Write Req (CCCD) -->
  <line x1="135" y1="780" x2="568" y2="780" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#ap)"/>
  <rect x="195" y="767" width="320" height="22" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="783" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Write Req (CCCD = 0x0001)</text>
  <text x="680" y="783" font-size="10" fill="#888">启用通知</text>

  <!-- Write Rsp -->
  <line x1="570" y1="805" x2="137" y2="805" stroke="#7E57C2" stroke-width="1.8" marker-end="url(#apl)"/>
  <rect x="250" y="793" width="210" height="20" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1"/>
  <text x="355" y="808" text-anchor="middle" font-size="11" fill="#7E57C2" font-weight="bold">ATT Write Rsp</text>

  <!-- ===== Phase 5: 数据传输 ===== -->
  <rect x="5" y="825" width="14" height="60" rx="3" fill="#FFFDE7" stroke="#F9A825" stroke-width="1"/>
  <text x="12" y="860" text-anchor="middle" font-size="10" fill="#F9A825" writing-mode="tb">数据传输</text>

  <!-- Notification -->
  <line x1="570" y1="845" x2="137" y2="845" stroke="#F9A825" stroke-width="1.8" marker-end="url(#apl)"/>
  <rect x="230" y="832" width="250" height="22" rx="4" fill="#FFFDE7" stroke="#F9A825" stroke-width="1"/>
  <text x="355" y="848" text-anchor="middle" font-size="11" fill="#F57F17" font-weight="bold">ATT Notification</text>

  <!-- Write Command -->
  <line x1="135" y1="875" x2="568" y2="875" stroke="#F9A825" stroke-width="1.8" marker-end="url(#ap)"/>
  <rect x="230" y="862" width="250" height="22" rx="4" fill="#FFFDE7" stroke="#F9A825" stroke-width="1"/>
  <text x="355" y="878" text-anchor="middle" font-size="11" fill="#F57F17" font-weight="bold">ATT Write Command</text>

  <!-- LL_TERMINATE_IND -->
  <line x1="135" y1="905" x2="568" y2="905" stroke="#C62828" stroke-width="2" marker-end="url(#ared)"/>
  <rect x="225" y="892" width="260" height="22" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="355" y="908" text-anchor="middle" font-size="11" fill="#C62828" font-weight="bold">LL_TERMINATE_IND (断开)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="280" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="14">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><path d="M0,0 L10,3.5 L0,7" fill="#E65100"/></marker>
  </defs>
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Central/Peripheral vs Master/Slave 术语映射</text>

  <!-- GAP column header -->
  <rect x="30" y="55" width="260" height="35" rx="4" fill="#5C6BC0"/>
  <text x="160" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">GAP 层（应用视角）</text>

  <!-- LL column header -->
  <rect x="410" y="55" width="260" height="35" rx="4" fill="#FFA726"/>
  <text x="540" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Link Layer（链路视角）</text>

  <!-- Central box -->
  <rect x="30" y="110" width="260" height="60" rx="8" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="2"/>
  <text x="160" y="138" text-anchor="middle" font-size="16" font-weight="bold" fill="#283593">Central</text>
  <text x="160" y="158" text-anchor="middle" font-size="12" fill="#555">发起连接的设备</text>

  <!-- Master box -->
  <rect x="410" y="110" width="260" height="60" rx="8" fill="#FFF3E0" stroke="#FFA726" stroke-width="2"/>
  <text x="540" y="138" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">Master</text>
  <text x="540" y="158" text-anchor="middle" font-size="12" fill="#555">控制跳频时序</text>

  <!-- Arrow Central -> Master -->
  <line x1="290" y1="140" x2="405" y2="140" stroke="#E65100" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="348" y="132" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">同一设备</text>

  <!-- Peripheral box -->
  <rect x="30" y="195" width="260" height="60" rx="8" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="2"/>
  <text x="160" y="223" text-anchor="middle" font-size="16" font-weight="bold" fill="#283593">Peripheral</text>
  <text x="160" y="243" text-anchor="middle" font-size="12" fill="#555">发广播等待连接</text>

  <!-- Slave box -->
  <rect x="410" y="195" width="260" height="60" rx="8" fill="#FFF3E0" stroke="#FFA726" stroke-width="2"/>
  <text x="540" y="223" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">Slave</text>
  <text x="540" y="243" text-anchor="middle" font-size="12" fill="#555">跟随时序</text>

  <!-- Arrow Peripheral -> Slave -->
  <line x1="290" y1="225" x2="405" y2="225" stroke="#E65100" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="348" y="217" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">同一设备</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="12">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565C0"/></marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6" fill="#E65100"/></marker>
  </defs>
  <text x="350" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">ARQ 重传机制（Stop-and-Wait）</text>

  <!-- Lifelines -->
  <rect x="60" y="40" width="100" height="28" rx="6" fill="#42A5F5"/>
  <text x="110" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Master</text>
  <line x1="110" y1="68" x2="110" y2="290" stroke="#42A5F5" stroke-width="1.8" stroke-dasharray="5,4"/>

  <rect x="520" y="40" width="100" height="28" rx="6" fill="#7E57C2"/>
  <text x="570" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Slave</text>
  <line x1="570" y1="68" x2="570" y2="290" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5,4"/>

  <!-- Exchange 1 -->
  <line x1="115" y1="90" x2="563" y2="90" stroke="#1565C0" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="220" y="76" width="250" height="20" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="345" y="91" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">SN=0, NESN=0（发送数据）</text>

  <!-- Exchange 2 -->
  <line x1="565" y1="125" x2="117" y2="125" stroke="#E65100" stroke-width="1.8" marker-end="url(#al)"/>
  <rect x="210" y="111" width="270" height="20" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="345" y="126" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">SN=0, NESN=1（确认收到，发数据）</text>

  <!-- Exchange 3 -->
  <line x1="115" y1="160" x2="563" y2="160" stroke="#1565C0" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="210" y="146" width="270" height="20" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="345" y="161" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold">SN=1, NESN=1（确认收到，发下一包）</text>

  <!-- Exchange 4 -->
  <line x1="565" y1="195" x2="117" y2="195" stroke="#E65100" stroke-width="1.8" marker-end="url(#al)"/>
  <rect x="220" y="181" width="250" height="20" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="345" y="196" text-anchor="middle" font-size="11" fill="#E65100" font-weight="bold">SN=1, NESN=0（确认收到）</text>

  <!-- Retransmit note -->
  <rect x="50" y="230" width="600" height="50" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="1.2"/>
  <text x="350" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">重传触发</text>
  <text x="350" y="270" text-anchor="middle" font-size="11" fill="#555">若 Master 发出 SN=0 后，Slave 回复 NESN=0（未变化）→ Slave 未收到 → Master 重传 SN=0</text>
</svg>
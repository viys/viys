<svg xmlns="http://www.w3.org/2000/svg" width="650" height="200" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="13">
  <text x="325" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">AD Structure 与 Manufacturer Specific Data 格式</text>

  <!-- AD Structure -->
  <text x="20" y="52" font-size="13" font-weight="bold" fill="#1565C0">AD Structure：</text>
  <rect x="20" y="60" width="100" height="42" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="70" y="79" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Length</text>
  <text x="70" y="96" text-anchor="middle" font-size="10" fill="#555">1 byte</text>

  <rect x="120" y="60" width="100" height="42" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="170" y="79" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">AD Type</text>
  <text x="170" y="96" text-anchor="middle" font-size="10" fill="#555">1 byte</text>

  <rect x="220" y="60" width="410" height="42" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="425" y="79" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">AD Data</text>
  <text x="425" y="96" text-anchor="middle" font-size="10" fill="#555">(Length - 1) bytes</text>

  <!-- Manufacturer Specific Data -->
  <text x="20" y="130" font-size="13" font-weight="bold" fill="#7E57C2">Manufacturer Specific Data（AD Type = 0xFF）：</text>
  <rect x="20" y="138" width="160" height="42" rx="4" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="100" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#7E57C2">Company ID</text>
  <text x="100" y="174" text-anchor="middle" font-size="10" fill="#555">2 bytes（小端序）</text>

  <rect x="180" y="138" width="450" height="42" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="405" y="157" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">Custom Data（厂商自定义）</text>
  <text x="405" y="174" text-anchor="middle" font-size="10" fill="#555">0 – 27 bytes</text>
</svg>
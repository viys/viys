<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="12">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565C0"/></marker>
    <marker id="al" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="#E65100"/></marker>
  </defs>
  <text x="360" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">SMP 配对流程概览</text>

  <!-- Lifelines -->
  <rect x="50" y="45" width="120" height="32" rx="6" fill="#42A5F5"/>
  <text x="110" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Central</text>
  <line x1="110" y1="77" x2="110" y2="470" stroke="#42A5F5" stroke-width="1.8" stroke-dasharray="5,4"/>

  <rect x="530" y="45" width="130" height="32" rx="6" fill="#7E57C2"/>
  <text x="595" y="66" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Peripheral</text>
  <line x1="595" y1="77" x2="595" y2="470" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5,4"/>

  <!-- Step 1 -->
  <rect x="10" y="90" width="16" height="16" rx="8" fill="#1565C0"/>
  <text x="18" y="102" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">1</text>
  <line x1="115" y1="105" x2="588" y2="105" stroke="#1565C0" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="350" y="99" text-anchor="middle" font-size="12" fill="#1565C0" font-weight="bold">Pairing Request</text>
  <text x="350" y="115" text-anchor="middle" font-size="10.5" fill="#888">IO Capability · AuthReq · MaxKeySize · 密钥分发请求</text>

  <!-- Step 2 -->
  <rect x="10" y="130" width="16" height="16" rx="8" fill="#E65100"/>
  <text x="18" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">2</text>
  <line x1="590" y1="145" x2="117" y2="145" stroke="#E65100" stroke-width="1.8" marker-end="url(#al)"/>
  <text x="350" y="139" text-anchor="middle" font-size="12" fill="#E65100" font-weight="bold">Pairing Response</text>

  <!-- Step 3: Key Generation -->
  <rect x="10" y="170" width="16" height="16" rx="8" fill="#2E7D32"/>
  <text x="18" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">3</text>
  <rect x="140" y="175" width="430" height="65" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="355" y="198" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">密钥生成</text>
  <text x="355" y="216" text-anchor="middle" font-size="11" fill="#555">Legacy: 基于 TK → STK（安全性较弱）</text>
  <text x="355" y="232" text-anchor="middle" font-size="11" fill="#555">LE Secure Connections (4.2+): 基于 ECDH → LTK（前向保密）</text>

  <!-- Step 4: Encryption -->
  <rect x="10" y="250" width="16" height="16" rx="8" fill="#C62828"/>
  <text x="18" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">4</text>
  <rect x="140" y="255" width="430" height="50" rx="8" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="355" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">链路加密</text>
  <text x="355" y="295" text-anchor="middle" font-size="11" fill="#555">LL_ENC_REQ → LL_ENC_RSP → LL_START_ENC_REQ → LL_START_ENC_RSP</text>

  <!-- Step 5: Key Distribution -->
  <rect x="10" y="315" width="16" height="16" rx="8" fill="#7E57C2"/>
  <text x="18" y="327" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">5</text>
  <rect x="140" y="320" width="430" height="50" rx="8" fill="#EDE7F6" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="355" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#7E57C2">密钥分发</text>
  <text x="355" y="360" text-anchor="middle" font-size="11" fill="#555">IRK（身份解析密钥）· CSRK（签名密钥）· LTK（长期密钥）</text>

  <!-- Step 6: Bonding -->
  <rect x="10" y="380" width="16" height="16" rx="8" fill="#FF8F00"/>
  <text x="18" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">6</text>
  <rect x="140" y="385" width="430" height="45" rx="8" fill="#FFF8E1" stroke="#FF8F00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="355" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF8F00">绑定（可选）</text>
  <text x="355" y="422" text-anchor="middle" font-size="11" fill="#555">双方将 LTK 等写入持久化存储（Flash）</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1565C0"/></marker>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#E65100"/></marker>
    <marker id="arr3r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2E7D32"/></marker>
    <marker id="arr3l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6" fill="#2E7D32"/></marker>
  </defs>
  <text x="400" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">BLE 连接建立流程</text>

  <!-- Lifelines -->
  <rect x="50" y="45" width="180" height="35" rx="6" fill="#7E57C2" stroke="#4A148C" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Peripheral (Advertiser)</text>
  <line x1="140" y1="80" x2="140" y2="360" stroke="#7E57C2" stroke-width="2" stroke-dasharray="6,4"/>

  <rect x="550" y="45" width="200" height="35" rx="6" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="650" y="68" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Central (Initiator)</text>
  <line x1="650" y1="80" x2="650" y2="360" stroke="#42A5F5" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Step 1: ADV_IND — arrow first, then rect+text on top to cover arrow -->
  <line x1="145" y1="115" x2="643" y2="115" stroke="#1565C0" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="230" y="101" width="330" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="395" y="118" text-anchor="middle" font-size="12" fill="#1565C0" font-weight="bold">ADV_IND (ch37 / 38 / 39)</text>
  <text x="675" y="118" font-size="11" fill="#888">扫描中...</text>

  <!-- Step 2: CONNECT_REQ — arrow first, then rect+text on top -->
  <line x1="643" y1="165" x2="147" y2="165" stroke="#E65100" stroke-width="2" marker-end="url(#arr2)"/>
  <rect x="220" y="151" width="350" height="24" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="395" y="168" text-anchor="middle" font-size="12" fill="#E65100" font-weight="bold">CONNECT_REQ（携带连接参数）</text>

  <!-- Note: stop advertising -->
  <rect x="20" y="195" width="245" height="30" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="1"/>
  <text x="142" y="215" text-anchor="middle" font-size="11" fill="#C62828">Peripheral 停止广播，等待首个连接事件</text>

  <!-- Step 3: Connection Event — text label above, arrows below in box -->
  <text x="395" y="260" text-anchor="middle" font-size="13" fill="#2E7D32" font-weight="bold">Connection Event（数据信道，跳频通信）</text>
  <rect x="135" y="272" width="520" height="30" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="145" y1="287" x2="340" y2="287" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr3r)"/>
  <line x1="645" y1="287" x2="450" y2="287" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr3l)"/>

  <!-- Label -->
  <text x="395" y="335" text-anchor="middle" font-size="14" fill="#2E7D32" font-weight="bold">连接正式建立 ✓</text>
</svg>
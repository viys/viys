<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#555"/></marker>
  </defs>
  <text x="300" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">GATT 数据层级结构</text>

  <!-- Profile -->
  <rect x="30" y="50" width="540" height="310" rx="10" fill="#EDE7F6" stroke="#7E57C2" stroke-width="2"/>
  <text x="55" y="75" font-size="16" font-weight="bold" fill="#4A148C">Profile</text>
  <text x="160" y="75" font-size="12" fill="#7E57C2">（完整应用场景规范集合，如 HID Profile）</text>

  <!-- Service -->
  <rect x="55" y="90" width="500" height="255" rx="8" fill="#E3F2FD" stroke="#42A5F5" stroke-width="2"/>
  <text x="80" y="115" font-size="15" font-weight="bold" fill="#1565C0">Service</text>
  <text x="160" y="115" font-size="12" fill="#42A5F5">（UUID 标识，如 0x180F Battery Service）</text>

  <!-- Characteristic -->
  <rect x="80" y="130" width="460" height="200" rx="8" fill="#FFF3E0" stroke="#FFA726" stroke-width="2"/>
  <text x="105" y="155" font-size="14" font-weight="bold" fill="#E65100">Characteristic</text>
  <text x="240" y="155" font-size="12" fill="#FFA726">（UUID 标识，数据交互最小单元）</text>

  <!-- Declaration -->
  <rect x="105" y="170" width="410" height="42" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="130" y="192" font-size="13" font-weight="bold" fill="#2E7D32">Declaration</text>
  <text x="105" y="207" font-size="11" fill="#555">　　　　　　　　Properties · Value Handle · UUID</text>

  <!-- Value -->
  <rect x="105" y="220" width="410" height="42" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <text x="130" y="242" font-size="13" font-weight="bold" fill="#1565C0">Value</text>
  <text x="200" y="242" font-size="12" fill="#555">实际数据（由应用读写）</text>
  <text x="200" y="257" font-size="11" fill="#888">如 Battery Level = 85%</text>

  <!-- Descriptor -->
  <rect x="105" y="270" width="410" height="48" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="130" y="292" font-size="13" font-weight="bold" fill="#C62828">Descriptor</text>
  <text x="220" y="292" font-size="12" fill="#555">元数据（可选，可有多个）</text>
  <text x="130" y="310" font-size="11" fill="#888">最常用：CCCD（0x2902）控制 Notify/Indicate 开关</text>
</svg>
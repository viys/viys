<svg xmlns="http://www.w3.org/2000/svg" width="650" height="180" font-family="'Microsoft YaHei','Segoe UI',Arial,sans-serif" font-size="13">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#555"/></marker>
  </defs>
  <text x="325" y="22" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Coded PHY 编码原理</text>

  <!-- Step 1 -->
  <rect x="20" y="55" width="130" height="45" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="85" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">原始数据 bit</text>
  <text x="85" y="91" text-anchor="middle" font-size="11" fill="#555">1 Mbps 码流</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="77" x2="188" y2="77" stroke="#555" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="192" y="55" width="145" height="45" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="264" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">卷积编码 (FEC)</text>
  <text x="264" y="91" text-anchor="middle" font-size="11" fill="#555">前向纠错</text>

  <!-- Arrow 2 -->
  <line x1="337" y1="77" x2="375" y2="77" stroke="#555" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="379" y="55" width="145" height="45" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="451" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Pattern Mapper</text>
  <text x="451" y="91" text-anchor="middle" font-size="11" fill="#555">扩频符号映射</text>

  <!-- Branch arrows -->
  <line x1="524" y1="68" x2="562" y2="55" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="524" y1="88" x2="562" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- S=2 -->
  <rect x="566" y="35" width="70" height="35" rx="5" fill="#7E57C2" stroke="#4A148C" stroke-width="1.2"/>
  <text x="601" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">S = 2</text>
  <text x="601" y="64" text-anchor="middle" font-size="10" fill="#fff">500 kbps</text>

  <!-- S=8 -->
  <rect x="566" y="82" width="70" height="35" rx="5" fill="#C62828" stroke="#B71C1C" stroke-width="1.2"/>
  <text x="601" y="97" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">S = 8</text>
  <text x="601" y="111" text-anchor="middle" font-size="10" fill="#fff">125 kbps</text>

  <!-- Notes -->
  <text x="20" y="140" font-size="11" fill="#555">S = Symbol spreading factor（符号扩频因子）= 每个信息 bit 对应的符号数</text>
  <text x="20" y="158" font-size="11" fill="#555">S=2: 1 bit → 2 chips，距离 ~2×　　S=8: 1 bit → 8 chips，距离 ~4×</text>
</svg>